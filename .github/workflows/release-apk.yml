name: Build APK On Release

# Disabled: APK is built locally with release keystore and uploaded manually.
# CI doesn't have access to the signing key.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with release tag
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/POSin-${TAG_NAME}.apk"

      - name: Upload APK to GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/POSin-${{ github.event.release.tag_name }}.apk
