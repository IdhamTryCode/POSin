name: posin
description: "POSin - Simple POS App"
publish_to: 'none'
version: 1.0.15+15

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database lokal
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Supabase
  supabase_flutter: ^2.8.0

  # Bluetooth printer (ESC/POS)
  blue_thermal_printer: ^1.1.1

  # UI
  google_fonts: ^6.2.1

  # Charts laporan
  fl_chart: ^0.69.0

  # Image picker
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.4

  # In-app updater
  package_info_plus: ^8.0.2
  dio: ^5.7.0
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
